<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Raleway:ital,wght@0,100..900;1,100..900&family=Space+Grotesk:wght@300..700&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <title>Frontend Mentor | Age calculator app</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 11px; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>

  <form action="">
    <div class="details">

    <div class="year-details">
      <label for="day">Day</label>
      <input type="text" name="" id="day" placeholder="DD">
    </div>

    <div class="year-details">
      <label for="month">Month</label>
      <input type="text" name="" id="month" placeholder="MM">
    </div>

    <div class="year-details">
      <label for="day">Year</label>
      <input type="text" class="y" name="" id="year" placeholder="YYYY">
    </div>

  </div>

  <div class="button">
    <p></p>
    
      <button><img id="button" src="assets/images/icon-arrow.svg" alt=""></button>

    
  </div>


  <div class="year-display">
    <p> <span id="y">--</span> years</p>
    <p> <span id="m">--</span> months</p>
    <p> <span id="d">--</span> days</p>
  </div>

  </form>

  <script src="script.js"></script>
</body>
</html>
